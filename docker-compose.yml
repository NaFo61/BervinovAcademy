services:
  db:
    image: postgres:15-alpine
    container_name: bervinov-academy-db
    ports:
      - "5433:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: bervinov-academy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # Kafka stack: backend/celery in Compose should use KAFKA_BOOTSTRAP_SERVERS=kafka:29092.
  # Host tools (kafka-console-consumer) use localhost:9092.
  zookeeper:
    # Pin: cp-*:latest switched to KRaft-only and breaks ZK env (KAFKA_PROCESS_ROLES).
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: bervinov-academy-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: bervinov-academy-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-backend
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    working_dir: /app/backend
    healthcheck:  # Добавлен healthcheck для backend
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bervinov-academy-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: >
      sh -c "npm install --ignore-scripts --omit=optional && npm run build"
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: "no"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: bervinov-academy-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-celery
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             celery -A school_platform worker --loglevel=info"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    working_dir: /app/backend
    healthcheck:
      disable: true

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-celery-beat
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             celery -A school_platform beat --loglevel=info"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app/backend
    healthcheck:
      disable: true

  # Образ песочницы (только build; entrypoint заменён, чтобы сервис сразу
  # завершился — runner использует image при docker run).
  code-check-sandbox:
    image: bervinov-academy-code-sandbox:local
    build:
      context: ./services/code_check_sandbox
    entrypoint: ["/bin/true"]
    restart: "no"

  code-check-runner:
    build:
      context: ./services/code_check_emulator
    image: bervinov-academy-code-check-runner:local
    container_name: bervinov-academy-code-check-runner
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_IN: code-submissions
      KAFKA_TOPIC_CODE_RESULTS: code-submission-results
      KAFKA_GROUP_ID: code-check-runner
      KAFKA_AUTO_OFFSET_RESET: earliest
      SANDBOX_IMAGE: bervinov-academy-code-sandbox:local
      MAX_CONCURRENT_RUNS: "2"
      DOCKER_RUN_TIMEOUT_BUFFER_SEC: "5"
      LOG_LEVEL: INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_healthy
      code-check-sandbox:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Миграции только в backend: параллельный migrate здесь даёт гонку на пустой БД
  # (duplicate key typname «users» в pg_type).
  kafka-results-consumer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-kafka-results-consumer
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             python manage.py consume_code_submission_results"
    volumes:
      - .:/app
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_CODE_RESULTS: code-submission-results
      KAFKA_GROUP_CODE_RESULTS: django-code-submission-results
      KAFKA_RESULTS_AUTO_OFFSET_RESET: earliest
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    working_dir: /app/backend
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
