services:
  db:
    image: postgres:15-alpine
    container_name: bervinov-academy-db
    ports:
      - "5433:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: bervinov-academy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-backend
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             python manage.py migrate &&
             python manage.py seed_data --clear &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app/backend
    healthcheck:  # Добавлен healthcheck для backend
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bervinov-academy-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: >
      sh -c "npm run build"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: bervinov-academy-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-celery
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             celery -A school_platform worker --loglevel=info"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app/backend

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bervinov-academy-celery-beat
    command: >
      sh -c "cd /app/backend &&
             python manage.py compilemessages -l en &&
             celery -A school_platform beat --loglevel=info"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app/backend

volumes:
  postgres_data:
  redis_data:
