<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bervinov Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/whiteboard.bundle.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        colors: {
          ink: '#0B1226',          /* a touch cooler than 111827 */
          paper: '#F6F8FC',        /* cool paper white */
          /* Reuse "violet" token name for the primary so existing classes flip cleanly */
          violet: { 500: '#3B82F6', 600: '#2563EB' },   /* blue 500/600 */
          /* Reuse "flame" token for the secondary accent — now cyan */
          flame:  { 500: '#06B6D4', 600: '#0891B2' },   /* cyan 500/600 */
        },
        boxShadow: {
          soft: '0 8px 24px -8px rgba(37, 99, 235, 0.20), 0 2px 6px -2px rgba(37, 99, 235, 0.08)',
          glow: '0 16px 48px -12px rgba(37, 99, 235, 0.40), 0 8px 24px -8px rgba(6, 182, 212, 0.22)',
          ring: '0 0 0 1px rgba(37, 99, 235, 0.10)',
        },
        keyframes: {
          shimmer: {
            '0%': { backgroundPosition: '-200% 0' },
            '100%': { backgroundPosition: '200% 0' },
          },
          float: {
            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
            '50%': { transform: 'translateY(-12px) rotate(2deg)' },
          },
          pulseDot: {
            '0%, 100%': { opacity: 1 },
            '50%': { opacity: 0.4 },
          },
          drift: {
            '0%, 100%': { transform: 'translate3d(0,0,0) scale(1)' },
            '33%':      { transform: 'translate3d(40px,-30px,0) scale(1.06)' },
            '66%':      { transform: 'translate3d(-30px,20px,0) scale(0.94)' },
          },
          spinSlow: {
            '0%': { transform: 'rotate(0deg)' },
            '100%': { transform: 'rotate(360deg)' },
          },
        },
        animation: {
          shimmer: 'shimmer 2.4s linear infinite',
          float: 'float 6s ease-in-out infinite',
          pulseDot: 'pulseDot 1.6s ease-in-out infinite',
          drift: 'drift 22s ease-in-out infinite',
          spinSlow: 'spinSlow 60s linear infinite',
        },
      },
    },
  };
</script>
<style>
  :root {
    --c-1: #1D4ED8;   /* blue 700 — deep */
    --c-2: #2563EB;   /* blue 600 — primary */
    --c-3: #0EA5E9;   /* sky 500 */
    --c-4: #06B6D4;   /* cyan 500 */
    --c-5: #22D3EE;   /* cyan 400 — bright */
    --paper: #F6F8FC;
    --ink: #0B1226;
  }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
  }
  ::selection { background: rgba(37, 99, 235, 0.18); color: var(--ink); }

  /* ---- Primary surfaces & gradients ---- */
  .grad-text {
    background: linear-gradient(95deg, var(--c-1) 0%, var(--c-2) 40%, var(--c-3) 70%, var(--c-5) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .grad-bg {
    background: linear-gradient(135deg, var(--c-1) 0%, var(--c-2) 35%, var(--c-3) 75%, var(--c-5) 100%);
  }
  .grad-bg-soft {
    background: linear-gradient(135deg, rgba(37,99,235,0.10) 0%, rgba(14,165,233,0.08) 50%, rgba(34,211,238,0.10) 100%);
  }
  .grad-border {
    background: linear-gradient(white, white) padding-box,
                linear-gradient(135deg, var(--c-2), var(--c-4)) border-box;
    border: 1px solid transparent;
  }

  /* ---- Rich page backgrounds ---- */
  /* HERO mesh: layered radial blobs + dot grid + faint diagonal lines */
  .mesh-bg {
    position: relative;
    background-color: var(--paper);
    background-image:
      radial-gradient(at 14% 10%, rgba(37,99,235,0.30) 0px, transparent 45%),
      radial-gradient(at 88% 16%, rgba(34,211,238,0.28) 0px, transparent 48%),
      radial-gradient(at 70% 90%, rgba(14,165,233,0.22) 0px, transparent 55%),
      radial-gradient(at 8% 88%, rgba(99,102,241,0.18) 0px, transparent 50%);
  }
  .mesh-bg::before {
    /* fine dot grid */
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(11,18,38,0.10) 1px, transparent 1px);
    background-size: 22px 22px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.25) 60%, transparent);
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.25) 60%, transparent);
    opacity: 0.6;
  }
  .mesh-bg::after {
    /* faint diagonal lines */
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(135deg, rgba(37,99,235,0.05) 0 2px, transparent 2px 80px);
    mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
  }

  .mesh-bg-dim {
    position: relative;
    background-color: var(--paper);
    background-image:
      radial-gradient(at 8% 0%, rgba(37,99,235,0.14) 0px, transparent 45%),
      radial-gradient(at 100% 0%, rgba(34,211,238,0.12) 0px, transparent 45%);
  }
  .mesh-bg-dim::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(11,18,38,0.07) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), transparent 70%);
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), transparent 70%);
  }

  /* large slow-drifting aurora blobs (placed into FloatingShapes) */
  .aurora {
    position: absolute; border-radius: 50%; filter: blur(48px);
    mix-blend-mode: multiply;
    will-change: transform;
    animation: drift 24s ease-in-out infinite;
  }
  .aurora-conic {
    position: absolute; inset: -20%;
    background: conic-gradient(from 90deg at 50% 50%,
      rgba(37,99,235,0.10), rgba(14,165,233,0.04),
      rgba(34,211,238,0.10), rgba(37,99,235,0.04),
      rgba(37,99,235,0.10));
    filter: blur(60px);
    animation: spinSlow 90s linear infinite;
    opacity: 0.7;
    pointer-events: none;
  }

  /* ---- UI atoms ---- */
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(37,99,235,0.20); border-radius: 999px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }

  .btn-grad {
    background: linear-gradient(90deg, var(--c-1) 0%, var(--c-2) 35%, var(--c-3) 70%, var(--c-4) 100%);
    background-size: 200% 100%;
    transition: background-position 700ms ease;
  }
  .btn-grad:hover { background-position: 100% 0; }
  .btn-shimmer { position: relative; overflow: hidden; }
  .btn-shimmer::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.40) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 700ms ease;
  }
  .btn-shimmer:hover::after { transform: translateX(100%); }

  .glass {
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .glass-dark {
    background: rgba(11, 18, 38, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .code-bg {
    background: #0B1226;
    color: #E2E8F0;
  }
  .code-bg ::selection {
    background: rgba(56, 189, 248, 0.35);
    color: #f1f5f9;
  }

  .check-dot {
    width: 16px; height: 16px; border-radius: 999px;
    background: linear-gradient(135deg, #22C55E, #16A34A);
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
  }
  .cross-dot {
    width: 16px; height: 16px; border-radius: 999px;
    background: linear-gradient(135deg, #EF4444, #DC2626);
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* ── Theory lesson prose ── */
  .theory-content { font-size: 15px; line-height: 1.8; color: rgba(11,18,38,0.82); }
  .theory-content h1 { font-size: 1.65rem; font-weight: 800; margin: 0 0 0.75rem; color: #0B1226; }
  .theory-content h2 { font-size: 1.3rem;  font-weight: 700; margin: 1.75rem 0 0.6rem; color: #0B1226; }
  .theory-content h3 { font-size: 1.1rem;  font-weight: 600; margin: 1.25rem 0 0.5rem; color: #0B1226; }
  .theory-content h4 { font-size: 1rem;    font-weight: 600; margin: 1rem 0 0.4rem; }
  .theory-content p  { margin-bottom: 1rem; }
  .theory-content ul, .theory-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
  .theory-content li { margin-bottom: 0.3rem; }
  .theory-content ul { list-style-type: disc; }
  .theory-content ol { list-style-type: decimal; }
  .theory-content strong { font-weight: 700; color: #0B1226; }
  .theory-content em { font-style: italic; }
  .theory-content a  { color: #2563EB; text-decoration: underline; text-underline-offset: 3px; }
  .theory-content code {
    background: rgba(11,18,38,0.07); padding: 0.15em 0.45em;
    border-radius: 5px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.875em; color: #1D4ED8;
  }
  .theory-content pre {
    background: #0B1226; color: #E2E8F0;
    padding: 1.25rem 1.5rem; border-radius: 14px;
    overflow-x: auto; margin: 1.25rem 0; font-size: 0.875rem;
    line-height: 1.65; font-family: 'JetBrains Mono', monospace;
  }
  .theory-content pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
  .theory-content blockquote {
    border-left: 3px solid #2563EB; padding: 0.5rem 1rem;
    margin: 1rem 0; color: rgba(11,18,38,0.65); font-style: italic;
    background: rgba(37,99,235,0.04); border-radius: 0 8px 8px 0;
  }
  .theory-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.25rem; font-size: 0.9rem; }
  .theory-content th, .theory-content td { border: 1px solid rgba(11,18,38,0.1); padding: 0.55rem 0.85rem; text-align: left; }
  .theory-content th { background: rgba(11,18,38,0.04); font-weight: 600; }
  .theory-content hr { border: none; border-top: 1px solid rgba(11,18,38,0.08); margin: 1.5rem 0; }

  .avatar-ring {
    background: linear-gradient(135deg, var(--c-1), var(--c-3), var(--c-5));
    padding: 3px; border-radius: 999px;
  }

  input:focus, textarea:focus, button:focus { outline: none; }
  .ring-grad:focus-within {
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    border-color: var(--c-2);
  }

  .auth-input-wrap {
    border: 1px solid rgba(11, 18, 38, 0.10);
    background: #fff;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .auth-input-wrap:focus-within {
    border-color: rgba(139, 92, 246, 0.55);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
  }
  .auth-input-wrap.is-error {
    border-color: rgba(244, 63, 94, 0.55);
    box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.08);
  }

  .whiteboard-root {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    isolation: isolate;
    contain: strict;
    pointer-events: auto !important;
    touch-action: none;
  }
  .whiteboard-root .tl-container {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
    pointer-events: auto !important;
    touch-action: none;
  }
  .whiteboard-studio {
    contain: strict;
  }
</style>
</head>
