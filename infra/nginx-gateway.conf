# Главный nginx — /etc/nginx/sites-available/gateway.conf
# HTTPS: самоподписанный сертификат (IP) или Let's Encrypt (домен, см. infra/setup-https.sh)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream bervinov_academy {
    server 127.0.0.1:18080;
    keepalive 16;
}

# HTTP → HTTPS (+ ACME challenge для certbot)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    # --- Bervinov Academy (subdomain or dedicated host, proxied at /) ---
    location / {
        proxy_pass http://bervinov_academy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
